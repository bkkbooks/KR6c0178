body:
  text: 序事有殊塗而同指人有異趨而同行今儒者稱不朽必曰立德立功立言而釋氏亦有禪宗學宗律宗之説禪近於德律近於功學近於言然欲昭德象功以信今而垂後非言不著𮨇儒之立言吾知之矣當其發憤於始也必參之經史百家以盡其變考之天人性命以通其要歲月以濡之而弗預期其速效夫而後其有獲矣而猶未能貫也則實體諸當躬而心解神會以合乎其原乃無弗化也始得上下千百年抉微剔奧或近言焉或遠言焉復為之旁通曲喻俾天下曉然於作之者之聖而我不愧於述者之明斯其言以立立可以傳乃不謂浮圖灌頂師竟有合焉者師學佛者也其言與吾儒殊而生平廢寢忘餐以求至乎立言之地其用心亦與吾儒同師九歲入空門十九受戒律二十習講經越七載受德水師付囑為雲棲五世法孫今行年幾八十矣固嘗應士大夫之延請歷聚光天竺諸剎宣妙諦以昭示聾瞽仍然草衣木食幽棲斗室中手不停批者凡五十年所著華嚴金剛等解書二十六種卷一百五十皆深入性海發導師之所欲發再發其所未發余竊欲其立意之堅積功之久而苟肆力於儒書將與昌黎廬陵諸君子後先並峙而獨惜其以浮圖終也然精修梵行闡宗風於五濁惡世而廣開其覺路是誠法王之嗣子所謂無盡燈明明終不盡者也京師愍忠寺義學僧景雲與余交不憚數千里參學於師因悉師生平裒其鋟木若干入楞嚴古剎之大藏釋典而囑寺僧居守以見師之立言為可傳也故序之康熙五十八年己亥清和月嘉禾守三韓吳永芳撰并書序唐三藏元奘大師慨經文訛謬周遊西宇十有七年取經六百五十七部翻譯于玉華宮太宗敕諸文臣為之潤色以心經為首作聖教序以紀之譯師皆西域人唯師以唐人譯西經為慈恩相宗之祖心經尤為一大藏之主非倒瀉一大藏經者不能注隻字唯伯亭大師臥心藏教者五十年諸經解畢始及心經一解理性為體一解事觀為用體用融通性相雙貫洵慈恩之大功臣也法弟邵泰衢拜題序大聖説心經者為度一切心也衆生迷心受五蘊體溺於愛河中隨風浪漂入苦海不得解脫徒悲傷也菩薩悟心駕般若航來於此岸不住中流度到彼岸自在逍遙真常樂也迷悟既殊苦樂各別因果染淨生佛一異如來憫之帶果行因為九界人重轉法輪直指般若靈知之心點出波羅密行之性心歸妙覺真空性還涅槃寂滅無凡無聖何佛何生諸法空相心經説竟義固如是文猶未然然文字般若必須觀照始證實相成第一空是以今家解經盡用觀門而釋事相難明聖教正量性宗相宗小乘大乘一一採摘句句消清祖誥佛誥論義呪義法法遵依章章典據然後會事歸理融相通性文字性空佛經心注名事觀解不亦宜乎故曰心經事觀解時康熙癸未年十月小春望旦慈雲教觀沙門續法題般若心經解總目上卷事觀解初序二懸談八門三經題四譯人五文義六頌下卷理性解初序二經題三文呪四頌

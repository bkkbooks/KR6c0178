body:
  text: 清浙水慈雲寺顯密教觀沙門續法述將解此經十門分別一教起因緣二藏乘分攝三時會判定四教觀分齊五所被機宜六能詮體性七宗趣通局八翻譯傳流九總釋經題十別解文義一教起因緣者然有總別總者如來唯為一大事因緣出現於世欲令眾生開佛知見今經直指眾生以般若真空心入佛之知見故別者開十一為闡不共般若故經云行深般若二為度一切苦厄故經云照五蘊空度一切苦三為離四性相即故文云色不異空空即是色離四句絕百非也四為無六相不立故生滅垢淨增減俱無纖塵不立也五為明諸法如幻故蘊處界世間法諦緣智出世法盡如幻影空無實也六為顯法性真空故文云諸法空相空中無色等七為究涅槃三德故心無罣礙恐怖夢想業報惑障悉除安住涅槃三德八為證菩提三覺故自覺離心異凡夫覺他離色異二乘圓覺識境二俱離異菩薩也九為示顯密融通故前顯了經後祕密呪二皆融通無礙十為圓福慧果德故經義解理發慧呪語離障生福福慧二嚴定智兩足果位功德圓滿究竟依經敘十因緣令此教興起也二藏乘分攝者經律論三經藏所攝顯密四藏經呪二攝非律論故大小乘內大乘所攝三一乘中一乘所攝十二分教長行重頌授記孤起自說因緣譬喻本事本生方廣未有論義經分教攝三時會判定者三照先轉還時中轉照時說三轉初中後照時後轉照說五會華嚴阿含深密妙智法華之中妙智會說十儀之中差別起末歸本無礙不定顯密頓演寂寞該通無盡無礙寂寞二儀門收四教觀分齊者教類有五一小乘教二大乘始教亦名分教三終教亦名實教四一乘頓教五圓教今此經者正屬頓教總不說法相唯顯真空性故經云空中無色無所得故心無罣礙初云行深般若五蘊皆空兼通始終二教是諸法空相無智亦無得始也依般若故究竟涅槃得三菩提終也觀道有三一三諦觀瓔珞經明真俗中仁王經明空色心亦名真世第一義梵網明實世第一義亦名空有中道今經色不異空空觀真諦也空不異色假觀俗諦也即色即空中道觀第一義諦也又不生等真諦觀不滅等俗諦觀諸法空相第一義空中諦觀也二三空觀唯識云一我空慧二法空慧三俱空慧楞嚴明人空法空俱空梵網謂內空外空空空經云照見我五蘊法皆空俱三空觀也又云無智亦無得以無所得故又云心無罣礙無礙故智心內人空觀無得無礙外法空觀無所得故無罣礙故空空俱觀三三無觀唯識燈論謂徧計無性觀依他無性觀圓成無性觀彼頌云初即相無性次無自然性後由遠離前所執我法性是則初名無相觀次名無生觀後名無性觀經云能除一切苦真實不虗除苦厄徧計觀除一切依他觀真實圓成觀又云是諸法空相相即無相觀法即無生觀空即無性觀又不生不滅心無恐怖實性無性觀不垢不淨心無罣礙起性無性觀不增不減心無倒想執性無性觀餘例思之五所被機宜者眾生機類不出三聚及五乘性於三聚正定邪定不定中正為不定以破凡外遍計空有迴彼二乘令向大乘告舍利子令權菩薩不迷於空空即色等令三乘人入一乘中道色不異空及不生不滅等兼為正定令增妙行及為邪定作遠因緣於五乘人天聲聞緣覺菩薩中唯被菩薩菩薩行深般若故於五性中聲聞緣覺如來不定無性正被如來種性及不定性文云菩薩究竟涅槃諸佛得三菩提兼為餘性作遠因緣是知聞與不聞情及無情凡具般若性者莫非所被機也六能詮體性者一隨相門文云說般若呪聲名文義皆為體也二唯識門經云心無罣礙前能所詮皆自識變三歸性門下云是諸法空相遠離顛倒夢想則心識亦空唯真如性故四無礙門如云空不異色色即是空不增不減等故知般若是大神呪等則前心境事理同一緣起無礙又行深般若說般若呪文字也初一門體照見蘊空離顛倒想觀照也二三門體度一切苦真實不虗實相也後一門體故此一經四皆攝盡七宗趣通局者通途有六一小乘宗二十部異二法相宗唯識論師護法等三破相宗智度論師清辯等四藏心宗起信論師馬鳴等五真性宗楞伽論師龍樹等六法界宗華嚴論師天親等今此經者三五門攝以般若部空性雙通智光論師合一宗故別局此經明宗趣者又有總別總以三種般若而為宗趣謂依文字教起觀照智為宗證得真空實相為趣別開五對一教義崇文字教說為宗不取有無諸法義意為趣二事理空去世出世法事相為宗顯最上乘第一義空理性為趣三境智緣諸法空相非相理境為宗起般若照見無見觀智為趣四修證以無心無智行深般若修因為宗即無得無取證入涅槃果德為趣五體用圓滿菩提歸無所得本體為宗隨緣赴感度一切苦大用為趣此五生起後先相由者也八翻譯傳流者此經前後七譯一後秦鳩摩羅什譯名摩訶般若波羅蜜大明呪經二唐三藏法師玄奘譯名般若波羅蜜多心經三唐天竺三藏大廣智不空譯名梵本般若波羅蜜多心經四宋天竺三藏達磨戰濕羅譯法月名普徧智藏般若波羅蜜多心經五賓沙門般若共利言等譯般若波羅蜜心經六宋三藏慈賢譯名梵本般若波羅蜜多心經七宋天竺三藏施護譯名佛說聖佛母般若波羅蜜多心經今世所傳七中第二譯也至於古今疏註唐翻經沙門賢首國師略疏明天界寺僧宗泐如玘註解翰林學士宋濂文句餘不繁錄九總釋經題二先題目般若波羅蜜多心經此經單法為題般若體蜜多用不離一總相心依略疏亦可法喻為題六百卷大部喻如身十四行小本喻如心也梵語般若此云智慧智決斷義妙證真源但唯決定朗然獨照故般也慧揀擇義明了諸法必須揀擇修行斷惑故若也略開三種一實相所觀真空法性也二觀照能觀本覺妙慧也三文字詮上二者言教也梵語波羅此云彼岸即大涅槃翻大滅度大即法身滅即解脫度即般若三德祕藏也梵語蜜多此云到影含三義一離二度三到謂離生死此岸度過煩惱中流竟到涅槃彼岸也上約因此約果又大論云阿羅蜜秦言遠離波羅蜜秦言度過波羅伽秦言到至華嚴云以波羅蜜船不依此岸不著彼岸不住中流而度眾生無有休息上約智此約悲心有四種梵語紇哩䭾耶此云肉團心人身中心藏也色法所攝梵語質多耶此云緣慮心八識各能緣慮自分境故妄想所攝梵語阿賴耶此云集起心即第八識集諸種子起現行故種習所攝梵語乾栗陀耶此云堅實心即如來藏真如性也寂照所攝約法第四以般若波羅蜜心是萬法之體故約喻第一以一十四行之略能攝二十萬頌之廣為般若部中之心如人心藏是一身之要也約果揀非緣慮集起之心下云心無罣礙究竟涅槃約因後三俱通唯識頌云金剛道後異熟空故又般若因名觀智心無相無為下云無智之智是也蜜多果名真空心無住無動下云無得之得是也梵語欲底修多羅此云契經契謂上契三世之佛中契三空之理下契三聚之機經謂常住所證覺性貫穿所知法義攝持所化眾生開為三對初教義般若心是所詮義經是能詮之教二就義中分總別對心是諸法之總稱為總相法門般若因蜜多果是別相法也亦名法喻對般若等法也心喻也即般若內統歸要妙之義況人心藏為主為要統極之本三就別法中分因果對或智悲對般若是因修觀智波羅蜜多是果地悲化亦名體用對般若是體此智慧體神悟玄奧妙證真源也波羅是用此到彼岸功用翻盡生死之處超至真空之際即揀不到彼岸用也具三對義故立斯名次譯人唐三藏法師玄奘奉詔譯唐洛州緱氏人俗姓陳隨兄長腱法師出家淨土寺年十一誦維摩法華二十一講心論時號神人貞觀三年仲秋朔往西域取經至賓國道險虎豹不可過遇一老僧面瘡體血衣服被污愍將向寺施與衣服飲食之具獨坐床上口授心經因常誦習遂得山川平易道路開通虎豹潛形魔鬼遁跡經歷百五十國至舍衛城取經六百五十七部以貞觀十九年春正月還京於玉華臺翻譯經論總一千三百三十卷共成七十五部年五十六臥疾見大蓮花鮮白光色及見佛相右脇而逝葬於白鹿原此與什本大同小異十別解文義二初顯了般若謂經是顯了明說令解生慧滅煩惱障故於中分三一序自行深般若同諸經序分觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄初句能觀人梵語縛嚕枳帝濕伐囉此云觀自在或云觀世音實相觀照救世自在此約智悲釋又觀音救苦恒在那伽此約慧定釋又法華真淨智慈悲五觀定也妙觀梵潮勝五音慧也均等自在又五觀中前三智也後二悲也五音中三四悲也餘三智也正顯智悲並運真俗融通上同下合得大自在此是帶果行因號也果地號正法明如來菩謂菩提翻覺薩謂薩埵翻眾生以智上求菩提用悲下救眾生也上三字別號此二字通名菩薩西輔彌陀化主來住普陀香山廣度眾生同歸樂土觀音自在良有以也二句所行行深對淺言共般若淺也不共般若深也人空般若淺也法空俱空般若深也大品云欲求聲聞乘者當學般若波羅蜜欲求辟支佛者當學般若波羅蜜欲求無上菩提者當學般若波羅蜜金剛云一切賢聖皆以無為法而有差別涅槃明三獸度河謂象馬兔華嚴云諸法實相三乘皆得而不名佛則知斷證理行有淺深也至於說法度生法華云應以聲聞身得度者即現聲聞身應以佛身得度者即現佛身等金剛云為發大乘者說為發最上乘者說則知度三乘人三空觀度一乘人俱空觀入矣今揀淺行故云深時三句觀行境照見者觀照般若也又因地識強智弱照屬六識見屬八識兼慧心所果位智強識弱照屬妙觀察智見屬大圓鏡智也五蘊境也自他凡聖俱攝梵語塞徤陀此云蘊積聚義或翻陰葢覆義積聚有為葢覆真性故嚕伴翻色乃堅固想成質礙為相謂四大所成根塵等法色空為際尾也難喃翻受乃虗明想成領納為相謂領納苦樂不苦樂境觸離為際三倪也喃翻想乃融通想成取像為相謂取種種像與念相應記忘為際三塞歌囉翻行乃幽隱想成遷流為相謂心心所法川流不息生滅為際尾野喃翻識乃罔象想成了別為相謂於所緣境熾然了別合六和湛一精為際皆空者梵語秫達翻空實相般若也上之照見三空無分別慧此之蘊空三空法性理境蘊中無我即人空蘊本不生即法空蘊空亦空即俱空故什本云色空故無壞相受空故無納相想空故無知相行空故無作相識空故無覺相大品云色如聚沫受如泡珠想如陽𦦨行如芭蕉識如幻化並非實相楞嚴云幻妄稱相緣有合離妄成生滅故真體為性一切法性本自不生故蘊中三空法性唯深慧所能見也四句明利益超脫曰度如刀斬物曰切一切統攝自他九法界也苦謂五苦即生老病死一求不得二愛別離三怨憎會四五陰熾盛五苦也廣則二苦三苦八苦十苦楞嚴百一十苦菩薩善戒等厄謂七難即水火風刀鬼枷賊也廣則三災六災大三災小三災八難十難楞嚴百萬障華嚴難等證見第一義空二死障惱斯盡二種果得一真理顯也又眾生不修見有蘊苦如水結冰受寒困厄菩薩修觀蘊空無苦如冰化水得陽和樂則行止功過可勿思乎宋譯云爾時世尊即入甚深光明宣說正法三摩地時觀自在菩薩在佛會中已能修行甚深般若波羅蜜多觀見五蘊自性皆空唐不空云菩薩白言我欲於會中說諸菩薩普徧智藏般若波羅蜜多心蒙佛聽許入慧光定照五蘊空度苦厄等故此一節為諸經序文二正教第一義空同諸經正宗分於中二先修因三一觀五蘊空舍利子色不異空空不異色色即是空空即是色受想行識亦復如是施護本云舍利子白觀自在菩薩言若有人欲修學甚深般若門者當云何修學時觀自在菩薩呼名而告之故此節去皆屬正宗文也初句舉行人梵語舍利弗呾囉連父母稱名舍利母名翻身身端嚴故又云珠云鷺眼如明珠鶖鷺故弗呾囉父名翻圓滿論義圓滿故論師也亦翻子是舍利女之子也連為號者不忘親故佛弟子中智慧第一般若轉教四弟推尊次色四句明觀法宋譯云觀自在菩薩告尊者言若欲學此甚深般若當觀五蘊自性皆空伏疑難云色是有法云何皆空故答釋曰色不異空以色幻相不異空無相故又色即是空以色本無生性即空無生性故初句約相三句約性又伏難云空是無法云何容色故又答曰空不異色以空無相不異色幻相故又空即是色以空無生性即色無生性故二句通問四句通性問隔以釋亦可順次解釋人天疑色實有故告色不異空謂色幻相不異空無相也二乘疑空實無故告空不異色謂空無相不異色幻相也人天小乘明生滅法作析空觀故說不異相宗菩薩疑色為法相故告色即是空謂色本無生性即是空無生性也空宗菩薩疑空為無相故告空即是色謂空無生性即是色無生性也空相大乘了法無生作體空觀故說即是賢首疏云色是幻色必不礙空色不異空空是真空必不礙色空不異色順釋明色空不異也又云若礙於色即是斷空非真空故色即是空若礙於空即是實色非幻色故空即是色反顯明色空相即也又初句即杜順會色歸空觀天台從假入空觀二句即杜順明空入色觀天台從空入假觀三四句即杜順色空無礙出法界觀觀天台空假平等出纓絡經觀經云般若非有相亦非常相異相及計色大我小我在色中乃至非我相自性等色不異空故非無相亦非斷相一相及計我大色小色在我中乃至非人相他性等空不異色故非亦有亦無相三句非雙存亦非即蘊是我乃至非眾生相共性等色即是空故非非有非無相四句非並泯亦非離蘊是我乃至非壽者相無因性等空即是色故若能離四句有無存泯句也四相四性俱攝在內絕百非方是甚深般若觀門故以四句曉之也楞嚴云汝原不知如來藏中性色真空色不異空色即是空性空真色空不異色空即是色清淨本然周徧法界隨眾生心應所知量菩薩告以四句不其然乎若以水喻應云冰不異水水不異冰冰即是水水即是冰冰水皆幻相濕性是不異又以金喻亦云器不異金金不異器器即是金金即是器器金亦幻相堅性同無異設遇沙冰泥水鍍器鑛金是異不即矣凡聖迷悟若此後受二句例餘蘊色空無相性本寂滅既爾餘四蘊法遠離性相亦然色法四句三觀如此餘受想等四句三觀亦若是也受不異空乃至識不異空空觀也空不異受乃至空不異識假觀也即受即空乃至即空即識中觀也以真空性識即離無礙故二明六相空舍利子是諸法空相不生不滅不垢不淨不增不減是諸法者望上五蘊望下處界等空者謂第一義空二空唯識三空楞嚴七空楞伽十空梵網十八空大品二十空等相者謂生滅等六相約觀釋之是即我空法即法空空即俱空又諸法假觀空相空觀合為中道觀也生滅約體以真空體非前際生非後際滅絕常絕斷故云不生滅也垢淨約相以真空相非迷時垢非悟時淨離有離無故云不垢淨也增減約用以真空用非聖位增非凡位減超異超一故云不增減也又生滅世間蘊處界法垢淨出世諦緣智法增減上上菩提涅槃法就世法言蘊是生滅處是垢淨界是增減出世法言十二因緣生滅四諦垢淨智得增減真空離此故云不也又不生實諦觀不滅世諦觀合名第一義諦觀梵網不垢空性觀不淨色相觀兼則中心觀仁王不增無為觀不減有為觀連成性空觀梵網又不生滅生空觀也不垢淨法空觀也不增減俱空觀楞嚴也六相既遣空理自顯如冰未銷自有凝散污潔巨細等相今既化為一水便歸不生不滅體矣真空亦然三示諸法空一世間法三科共三十五二出世法三門共十八總五十三若加六入名四科因緣中開生起還滅二門智得前加十度即成八十一法就經文明一五蘊二五苦三七厄難四六相五十二處六十八界七十二因緣八四諦九二空行十三心十一二果十二五呪亦有八十一法皆是般若真空相也中分為二先世間法空是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界是故空中承上接下之詞以是六相俱盡始成般若真空又真空中不但空彼六相即此色蘊等法亦空故云空中無色等也所謂瀰滿清淨中不容他世間法相有三一五蘊門此為愚心不愚色者利根而說故合色為一開心為四也而云無者楞嚴明色如空中眼花受如空手摩觸想如空談酢梅行如空泡瀑布識如空餉孔瓶理實皆悉不壞色等以自性空不待壞故楞伽云謂一切法自他共相皆不生故名為相空謂一切法自性不生名自性空下並準知二十二處門內六根外六塵名十二處處者所也根塵各有內外所在也乃為愚色不愚心者中根而說故合心為一分半謂意處全法處半分開色為十分半謂五根五塵法處半分也眼等名六根能生為義生識性故亦名六入吸取為義吸塵境故斫蒭翻眼如蒲萄朵見精暎色戍嚕怛囉翻耳如新卷葉聽精暎聲喝囉拏翻鼻如雙垂爪齅精暎香時吃縛翻舌如初偃月嘗精暎味歌野翻身如腰皷顙覺精暎觸摩囉翻意如幽室見知精暎法亦云無者楞嚴云因緣和合虗妄有生因緣別離虗妄名滅殊不知生滅本真空性性真空中求於生滅了無所得也色等名六塵染污為義染根識故路伴翻色青黃長短也設沒囉翻聲男女絃管也獻䭾辣翻香沉檀龍麝也佐塞翻味甜酸飲食也仡囉瑟吒耶翻觸冷煖衣服也達哩摩翻法過現影像也據楞嚴色屬明暗聲通動靜香該通塞味兼恬變觸連離合法統生滅俱曰無者經云觀相元妄無可指陳猶邀空花結為空果觀性元真惟妙覺空妙覺空心先非色法三十八界門內六根外六塵中六識名十八界界者界畔種族義識與根塵共相隣界各有種族也斯為心色俱愚者鈍根而說故心色俱開謂開心為七分半即六識意根法界心所半分開色為十分半即五根五塵法界無表半分也根塵名義如上六識者了別為義眼色為緣生於眼識分別明暗等色乃至意法為緣生於意識分別生滅等法無眼界者楞嚴云當知眼色為緣生眼識界三處都無乃至者超略之詞影略耳鼻舌身四識界也無意識界者楞嚴云當知意法為緣生意識界三處都無瑜伽云蘊處及界等遠離諸性相能取所取二取執二執諸法悉無我平等如虗空我空自性本不生法空空性圓寂故纖界不立真第一空此如冰人五蘊六根外觀六瓶六色之冰如處界等今遇火日之時總成一汪水矣不空何待次出世法空無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得以無所得故出世法相亦三一因緣門此為中乘緣覺而說一無明迷暗也煩惱障惑道二行造作也業障業道此二支屬過去因三識分別也初托母胎起一心意妄念四名色名是心受想行識四蘊也色是身色蘊也五六入胎中成六根也六觸出胎後三四歲六根對六塵也七受五六至十三歲領納前境違順苦樂也此五支報障苦道屬現在果八愛十四至十八九貪戀男女銀錢五欲等事也九取二十已後於五塵境廣徧追求也此二煩惱障惑道十有既有塵欲作有漏業當生三有也此一業障業道兼上為三支成未來因十一生四生六道中受生也十二老死既生五蘊身後畢至熟壞時也此二支報障苦道屬未來果然十二支作二門觀一生起門謂無明緣行乃至生緣老死今云無無明乃至無老死者以其緣生性空故也二還滅門謂無明滅則行滅乃至生滅則老死滅今云亦無無明盡乃至亦無老死盡者以其無生真空故也楞嚴云真性有為空緣生故如幻無為無起滅不實如空花喻一氷凍支佛獨宿雪峰朝看十二氷城雪園至昏暮時並不可得二四諦門此為小乘聲聞而說一苦諦是生死報果也令彼厭二集諦是煩惱業因也令彼斷此二世間因果三滅諦是涅槃理果也令彼欣四道諦是正助行因也令彼修此二出世因果觀四諦空成羅漢道然與前門開合異耳謂無明行愛取有五支合為集諦餘識名色入觸受生老死七支開為苦諦觀因緣智即為道諦十二支滅即為滅諦盡云無者出世對世間說既無苦集何有滅道因緣尚空四諦安寄金剛云實無有法名阿羅漢喻雪目連降一冰龍暑天想起影迹無踪三二法門此為大乘菩薩而說據楞嚴智得通前徹後今經義可上下法專衍門智謂二空觀智得即二空理境豈不小大俱通智乃六度中一得是波羅密果豈不局一大乘並云無者二空對治二執智慧為度愚癡愚執不立空智何有楞嚴云猶非真非真云何見所見金剛云佛說般若波羅蜜即非般若波羅蜜又云實無有法名為菩薩如冰文殊烘火觀氷盤珠頃刻洋去有何跡耶以句終歸一空也因由曰以不但無智無得即諦緣蘊界皆空無法非但空中無法即此空亦無得楞伽遣二無我維摩空病亦空楞嚴俱空不生仁王法空故空正此義也故者牒前起後之詞問前云空即是色今何空滅色耶答前雖存而未嘗不盡論云因緣所生法我說即是空今都亡而未嘗不立論云以有空義故一切法得成審前後上下文自知義意次證果二一菩薩究竟真空涅槃菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃先舉人依法菩提云覺道薩埵云有情一約境所求所度有情之中稱覺悟者二約心能證能斷有覺悟之智去情慮之識三約能所所求是佛覺果能求有情因也略稱菩薩大乘人名般若真空智波羅解脫境最上乘法金剛云第一波羅蜜即非第一波羅蜜梵網云第一義空慧門空空慧門空空復空慧門空空復空空慧門斯之謂也次斷障得果罣礙有為無為業障染淨善惡等現在心也恐怖有漏無漏苦報分段變易等未來心也倒想有相無相煩惱見愛無明等過去心也對前法言結縛礙也色塵處諦不垢不淨觀斷生死怖也受行蘊根因緣不生不滅觀斷癡惑夢也識想界智不增不減觀斷三心既不可得故無而又離也涅槃斷果究竟得入無餘也梵語摩訶般涅槃那華言大滅度大是法身滅是解脫度是般若此之三德非別外有迷即三障悟即三德三障若空三德乃顯所謂生死即法身煩惱即般若結業即解脫自非般若觀照功德不能開顯譬如磨鏡垢盡明現猶氷彌勒朝陽放布袋水流入大寂滅海澄渟皎潔也故此涅槃亦空無相法華云究竟涅槃常寂滅相終歸於空二諸佛圓證無相菩提三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提先舉人依法前屬大乘因地此局一乘果位過現未曰三世三劫各有千佛故云諸也梵語佛陀華言覺者一自覺真諦離心識超人天二覺他俗諦離色塵超二乘三圓覺中諦二俱離超菩薩具三覺義稱佛世尊能依人也般若所依法也謂於三性立三無性以觀一徧計執性作無相觀二依他起性作無生觀三圓成實性作無性觀以此三無性顯彼真空相成相三覺德更無別門也次得果成覺菩提智果也得字貫下菩提徹上阿耨多羅此云無上三藐此云正等三菩提此云正覺內含三義一正覺即如理智正觀真諦揀凡外之不正二等覺即如量智徧觀俗諦揀權小之不等三無上覺即無礙智統觀中諦揀因地有上此菩提果得實無得故大品云無得而得金剛云我於阿耨菩提無有少法可得又云實無有法如來得三菩提圓覺云妙圓覺心本無菩提及與涅槃亦無成佛及不成佛如晒彩色冰佛洋到妙莊嚴海森羅自現非外寶光為美飾也問前云以無所得今何得二果耶答由前真空有後實相故得二果又由後實相始成前真空故二果無得楞嚴云圓滿菩提歸無所得詳上二段密多故字意自可知以上正宗竟三結通祕密真言同諸經流通分故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗先別開五呪連般若呪成五名也故者躡前起後結後成前之意謂由前觀照般若方流後文字般若故生五呪祕密神章又由後文字般若方顯前觀照般若故起五蘊真空妙行佛般若呪如蜾蠃苦惱眾生如螟蛉教祝七日化為佛子故稱為呪除障不虗名神智鑒無昧名明更無加過名無上獨絕無倫名無等等徹果該因名般若波羅此就法釋能破煩惱曰神能破無明曰明令因行滿曰無上令果德圓曰無等等逆流度生曰般若波羅蜜依功能釋又約教明神者呪凡成聖小教超凡也明者呪染成淨始教超小也無上者呪妄成真終教超權也無等等者呪相成性頓教超漸也般若波羅蜜者呪生成佛圓教超偏也次總顯多能一切苦如前釋略言之滅除分段變易二生死苦證得菩提涅槃二種果樂也實不虗者般若勝益為作保任令諸眾生信受奉行如有所疑觀佛菩薩非般若外別得樂果也對五呪顯破色蘊惱超劫濁苦如舠渡過溪澗一百由旬到彼安養界中依正二報色相莊嚴歷劫不壞一種清樂神呪功益也破受蘊惱超見濁苦如艇渡過河港二百由旬到彼安養界中三寶功德受用樂境真知灼見二種清樂明呪功益也破想蘊惱超煩惱苦如艨艟渡湖過三百由旬到安養界十六觀門想念奧妙毫無煩惱三種清樂無上呪功益也破行蘊惱超眾生苦如𦫈艞渡江過四百由旬到安養界七日十念行為淨業好善眾生四種清樂無等呪功益也破識蘊惱超命濁苦如艆䑼渡過大海五百由旬到安養界中三輩九品識心快活上妙壽命五種清樂般若呪功益也又佛說五呪利民比如大海水潛流四天下沖成江湖河澗民實生活豈困苦耶如斯離苦得樂非般若不能觀自在能行故能自度度他一切苦也上顯了竟二祕密般若謂呪是祕密真言令誦生福滅罪業障故故說般若波羅蜜多呪即說呪曰先標名神明上等別顯般若蜜多總結故者承上起下也名多益廣已彰呪詞語句未出故為陳說梵語怛你也他此翻即說呪曰或云所謂揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶呪有二義一不可說以諸佛密語具多意義非因位所解但當誦持除障增福二亦可說以佛祖經論自為解釋今依教詮量令人悟入斷惑證真揭諦此云去度深慧功能復重言者自度度他也波羅此云彼岸度去所到處也僧者云總普眾謂自他普度九界眾生總到彼岸也菩提此云覺道謂至何等彼岸乃大菩提涅槃處也薩婆訶此云速疾成就令前所作速成疾就也初言揭諦是大神呪除生老病死苦即以文字般若度人天小教也重言揭諦是大明呪除求不得苦即以觀照般若度始教三乘人也波羅揭諦是無上呪除愛別離苦即境界般若度終教大乘人也波羅僧揭諦是無等等呪除怨憎會苦即眷屬般若度頓教一乘人也菩提薩婆訶是般若波羅蜜多呪除五陰熾盛苦即實相般若度圓教最上乘人也對顯般若初一揭諦觀自在序分也次復揭諦正宗中舍利子色不異空等也波羅揭諦諸法空相四句也波羅僧揭諦是故空中無色下去文也菩提二字從菩提薩埵至三菩提是也薩婆訶故知般若是大神呪流通文也配釋經題揭諦二句般若也波羅羯諦二句波羅蜜多也菩提薩訶心經也故知經即顯呪呪即密經隱顯融通第一義心徹矣佛語心妙為何如哉閣筆頌曰甚深般若絕相真空依教讚釋事義重重普願來學宗通說通
